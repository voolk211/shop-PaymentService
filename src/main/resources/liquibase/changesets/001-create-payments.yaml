databaseChangeLog:
  - changeSet:
      id: 001
      author: vyacheslav
      changes:
        - createCollection:
            collectionName: payments
            options:
              validator:
                $jsonSchema:
                  bsonType: "object"
                  required:
                    - order_id
                    - user_id
                    - status
                    - timestamp
                    - payment_amount
                  properties:
                    order_id:
                      bsonType: long
                      description: "Id of the order"
                    user_id:
                      bsonType: long
                      description: "ID of the user"
                    status:
                      bsonType: string
                      description: "Payment status"
                    timestamp:
                      bsonType: date
                      description: "Payment creation time"
                    payment_amount:
                      bsonType: decimal128
                      description: "Amount of the payment"

  - changeSet:
      id: 002
      author: vyacheslav
      changes:
        - runCommand:
            command: >
              { createIndexes: "payments", indexes: [{ key: { order_id: 1 }, name: "idx_payments_order_id" }] }

  - changeSet:
      id: 003
      author: vyacheslav
      changes:
        - runCommand:
            command: >
              { createIndexes: "payments", indexes: [{ key: { user_id: 1 }, name: "idx_payments_user_id" }] }

  - changeSet:
      id: 004
      author: vyacheslav
      changes:
        - runCommand:
            command: >
              { createIndexes: "payments", indexes: [{ key: { status: 1 }, name: "idx_payments_status" }] }

  - changeSet:
      id: 005
      author: vyacheslav
      changes:
        - runCommand:
            command: >
              { createIndexes: "payments", indexes: [{ key: { timestamp: 1 }, name: "idx_payments_timestamp" }] }